name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changesets
        id: check
        run: |
          count=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run version command
        if: steps.check.outputs.has_changes == 'true'
        run: npx changeset version

      - name: Update lockfile
        if: steps.check.outputs.has_changes == 'true'
        run: npm install --package-lock-only

      - name: Create or update release PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="changeset-release/main"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump version"
          git push origin "$BRANCH" --force
          gh pr create \
            --title "chore: bump version" \
            --body "Version bump from pending changesets." \
            --base main \
            --head "$BRANCH" \
            --label "skip-changeset" \
          || gh pr edit "$BRANCH" --title "chore: bump version" --add-label "skip-changeset"

      - name: Tag release
        if: steps.check.outputs.has_changes == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git tag | grep -q "^v$VERSION$"; then
            echo "Tag v$VERSION already exists, skipping."
          else
            NOTES=$(awk "/^## $VERSION/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
            git tag -a "v$VERSION" -m "$NOTES"
            git push --tags
          fi
